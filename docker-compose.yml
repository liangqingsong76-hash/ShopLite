services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shoplite}
      MYSQL_USER: ${MYSQL_USER:-shoplite}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: shoplite.settings
      DATABASE_URL: mysql://${MYSQL_USER:-shoplite}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-shoplite}
      REDIS_URL: redis://redis:6379/0
      USE_REDIS_CACHE: "True"
      TRUST_PROXY_HEADERS: "True"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  celery:
    build:
      context: .
      dockerfile: Dockerfile.celery
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: shoplite.settings
      DATABASE_URL: mysql://${MYSQL_USER:-shoplite}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-shoplite}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    command: celery -A shoplite beat -l info
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: shoplite.settings
      DATABASE_URL: mysql://${MYSQL_USER:-shoplite}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-shoplite}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/static:ro
      - media_data:/app/media:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  static_data:
  media_data:
