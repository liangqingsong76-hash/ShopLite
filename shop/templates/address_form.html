{% extends "base.html" %}

{% block title %}ShopLite - {% if edit %}编辑{% else %}新增{% endif %}地址{% endblock %}

{% block extra_head %}
<style>
    .addr-form-page { max-width: 560px; margin: 0 auto; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
</style>
{% endblock %}

{% block content %}
<div class="crumb">
    <a href="{% url 'shop:home' %}">首页</a><span>&gt;</span>
    <a href="{% url 'shop:address_list' %}">收货地址</a><span>&gt;</span>
    <span>{% if edit %}编辑{% else %}新增{% endif %}地址</span>
</div>

<div class="addr-form-page">
    <h1 style="margin:0 0 22px;">{% if edit %}编辑{% else %}新增{% endif %}收货地址</h1>

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">收货人</label>
            <input class="form-input" name="receiver" type="text" value="{{ address.receiver|default:'' }}" placeholder="请输入收货人姓名" required>
        </div>
        <div class="form-group">
            <label class="form-label">手机号</label>
            <input class="form-input" name="phone" type="text" value="{{ address.phone|default:'' }}" placeholder="请输入手机号" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">省份</label>
                <input class="form-input" name="province" type="text" value="{{ address.province|default:'' }}" placeholder="省份">
            </div>
            <div class="form-group">
                <label class="form-label">城市</label>
                <input class="form-input" name="city" type="text" value="{{ address.city|default:'' }}" placeholder="城市">
            </div>
            <div class="form-group">
                <label class="form-label">区县</label>
                <input class="form-input" name="district" type="text" value="{{ address.district|default:'' }}" placeholder="区县">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">详细地址</label>
            <input class="form-input" name="detail" type="text" value="{{ address.detail|default:'' }}" placeholder="街道、门牌号等" required>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:8px;margin-bottom:24px;">
            <input type="checkbox" name="is_default" id="is_default" {% if address.is_default %}checked{% endif %} style="width:18px;height:18px;accent-color:var(--ink);">
            <label for="is_default" style="font-size:14px;cursor:pointer;">设为默认地址</label>
        </div>
        <div style="display:flex;gap:10px;">
            <button class="btn btn-primary" type="submit">保存</button>
            <a class="btn btn-outline" href="{% url 'shop:address_list' %}">取消</a>
        </div>
    </form>
</div>
{% endblock %}
