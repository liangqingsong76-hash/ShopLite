<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShopLite{% endblock %}</title>
    <style>
        :root {
            --bg: #f7f7f6;
            --panel: #ffffff;
            --ink: #111111;
            --muted: #737373;
            --line: #e8e6e3;
            --soft: #f1efec;
            --accent: #bd8a5e;
            --danger: #d83a34;
            --shadow: 0 20px 60px rgba(20, 20, 20, 0.08);
            --radius: 8px;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--ink);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        a { color: inherit; text-decoration: none; }
        button, input { font: inherit; }
        button { cursor: pointer; }
        img { display: block; max-width: 100%; }

        .page-shell {
            width: min(1480px, calc(100vw - 56px));
            margin: 40px auto;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .site-header {
            min-height: 76px;
            display: grid;
            grid-template-columns: 180px 1fr 420px 156px;
            align-items: center;
            gap: 24px;
            padding: 0 32px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.95);
        }
        .brand { font-size: 26px; font-weight: 800; }
        .nav-links { display: flex; gap: 34px; align-items: center; font-weight: 600; }
        .nav-links a { position: relative; padding: 28px 0 25px; }
        .nav-links a.active::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 13px;
            height: 2px;
            background: var(--ink);
        }
        .search-box {
            height: 44px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 16px;
            background: #f4f4f4;
            border-radius: 22px;
            color: var(--muted);
        }
        .search-box input {
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
        }
        .header-actions { display: flex; justify-content: flex-end; gap: 18px; font-size: 24px; }
        .icon-link {
            position: relative;
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
        }
        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            min-width: 18px;
            height: 18px;
            display: grid;
            place-items: center;
            padding: 0 5px;
            border-radius: 999px;
            background: var(--danger);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
        }
        .content { padding: 32px; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 0 20px;
            border-radius: var(--radius);
            border: 1px solid var(--ink);
            background: var(--panel);
            color: var(--ink);
            font-weight: 700;
        }
        .btn-primary { background: var(--ink); color: #fff; }
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 34px 0 18px;
        }
        .section-title h2 { margin: 0; font-size: 24px; }
        .muted { color: var(--muted); }
        .price { font-weight: 800; }
        .price-red { color: var(--danger); }
        .old-price { color: #9a9a9a; text-decoration: line-through; margin-left: 10px; }

        .category-list { background: #fafafa; border-radius: var(--radius); padding: 12px; }
        .category-item {
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 14px;
            border-radius: 6px;
            font-weight: 600;
        }
        .category-item:hover, .category-item.active { background: var(--soft); }
        .category-name { display: flex; align-items: center; gap: 12px; }
        .tiny-icon {
            width: 22px;
            height: 22px;
            display: grid;
            place-items: center;
            color: var(--ink);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 24px;
        }
        .product-card { min-width: 0; }
        .product-image {
            aspect-ratio: 1.08 / 1;
            border-radius: var(--radius);
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 42%, rgba(255,255,255,0.8), rgba(255,255,255,0) 32%),
                linear-gradient(135deg, #eee8df, #f8f6f2);
            display: grid;
            place-items: center;
        }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-fallback {
            width: 62%;
            aspect-ratio: 1;
            border-radius: 50%;
            background: linear-gradient(145deg, #ded6ca, #ffffff);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.06), 0 18px 36px rgba(0,0,0,0.06);
        }
        .product-name {
            margin: 12px 0 8px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .product-meta { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 14px; }
        .stars { color: #ff8a1f; letter-spacing: 1px; }
        .amount-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
        .round-add {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: var(--panel);
            font-size: 20px;
        }
        .crumb { display: flex; gap: 10px; align-items: center; color: var(--muted); margin-bottom: 24px; }
        .filters { display: grid; gap: 16px; margin-bottom: 32px; }
        .filter-row { display: flex; align-items: center; flex-wrap: wrap; gap: 14px; }
        .filter-row strong { min-width: 70px; }
        .pill {
            padding: 9px 20px;
            border-radius: 20px;
            background: #f5f4f2;
            font-weight: 600;
            border: 0;
        }
        .pill.active { background: var(--ink); color: #fff; }
        .empty-note { padding: 24px; border-radius: var(--radius); background: #fafafa; color: var(--muted); }

        @media (max-width: 1100px) {
            .page-shell { width: min(100vw - 24px, 900px); margin: 16px auto; }
            .site-header { grid-template-columns: 1fr auto; padding: 18px; }
            .nav-links { grid-column: 1 / -1; gap: 18px; overflow-x: auto; }
            .search-box { grid-column: 1 / -1; width: 100%; }
            .content { padding: 20px; }
            .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <a class="brand" href="{% url 'shop:home' %}">ShopLite</a>
            <nav class="nav-links" aria-label="主导航">
                <a class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'shop:home' %}">首页</a>
                <a class="{% if request.resolver_match.url_name == 'category' %}active{% endif %}" href="{% url 'shop:category' %}">分类</a>
                <a class="{% if request.resolver_match.url_name == 'new_products' %}active{% endif %}" href="{% url 'shop:new_products' %}">新品</a>
                <a class="{% if request.resolver_match.url_name == 'hot_products' %}active{% endif %}" href="{% url 'shop:hot_products' %}">热门</a>
                <a class="{% if request.resolver_match.url_name == 'brand_page' %}active{% endif %}" href="{% url 'shop:brand_page' %}">品牌</a>
            </nav>
            <form class="search-box" action="{% url 'shop:category' %}" method="get">
                <span aria-hidden="true">Q</span>
                <input name="q" type="search" value="{{ keyword|default:'' }}" placeholder="搜索商品、品牌...">
            </form>
            <div class="header-actions">
                <a class="icon-link" href="{% url 'shop:profile' %}" aria-label="个人中心">U</a>
                <a class="icon-link" href="#" aria-label="收藏">H</a>
                <a class="icon-link" href="{% url 'shop:cart' %}" aria-label="购物车">C{% if cart_count %}<span class="badge">{{ cart_count }}</span>{% endif %}</a>
            </div>
        </header>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
