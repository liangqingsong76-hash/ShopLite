<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <!-- 导航栏 (根据UI图设计包含: 首页、分类、新品、热门、品牌) -->
    <nav class="bg-white p-4 shadow-sm flex justify-between items-center">
        <div class="font-bold text-xl">ShopLite</div>
        <!-- 使用 Django 模板标签动态判断用户是否登录 -->
        <div>
            {% if user.is_authenticated %}
                <a href="{% url 'account_logout' %}">退出</a>
            {% else %}
                <a href="{% url 'account_login' %}">登录</a>
            {% endif %}
        </div>
    </nav>

    {% block content %}
    {% endblock %}

</body>
</html>
