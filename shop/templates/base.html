<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShopLite{% endblock %}</title>
    <style>
        :root {
            --bg: #f7f7f6;
            --panel: #ffffff;
            --ink: #111111;
            --muted: #737373;
            --line: #e8e6e3;
            --soft: #f1efec;
            --primary: #3b82f6;
            --accent: #bd8a5e;
            --danger: #d83a34;
            --shadow: 0 20px 60px rgba(20, 20, 20, 0.08);
            --radius: 8px;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--ink);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        a { color: inherit; text-decoration: none; }
        button, input { font: inherit; }
        button { cursor: pointer; }
        img { display: block; max-width: 100%; }

        .page-shell {
            width: min(1480px, calc(100vw - 56px));
            margin: 40px auto;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .site-header {
            min-height: 76px;
            display: grid;
            grid-template-columns: 180px 1fr 420px 156px;
            align-items: center;
            gap: 24px;
            padding: 0 32px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.95);
        }
        .brand { font-size: 26px; font-weight: 800; }
        .nav-links { display: flex; gap: 34px; align-items: center; font-weight: 600; }
        .nav-links a { position: relative; padding: 28px 0 25px; }
        .nav-links a.active::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 13px;
            height: 2px;
            background: var(--ink);
        }
        .search-box {
            position: relative;
            height: 44px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 16px;
            background: #f4f4f4;
            border-radius: 22px;
            color: var(--muted);
            transition: all 0.2s;
        }
        .search-box:focus-within {
            background: #fff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 1px solid var(--line);
        }
        .search-box input {
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            font-size: 14px;
        }
        .search-btn {
            border: 0;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .search-btn:hover {
            background: rgba(0,0,0,0.05);
        }
        .search-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            z-index: 1000;
            display: none;
            overflow: hidden;
        }
        .search-dropdown.show {
            display: block;
        }
        .search-group {
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
        }
        .search-group:last-child {
            border-bottom: none;
        }
        .search-group-title {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .search-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .search-tag {
            padding: 6px 12px;
            background: #f7f7f6;
            border-radius: 16px;
            font-size: 13px;
            color: var(--ink);
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-tag:hover {
            background: var(--soft);
            color: var(--accent);
        }
        .search-history {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .search-history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .search-history-item:hover {
            background: #f7f7f6;
        }
        .search-history-item span:first-child {
            color: var(--muted);
            font-size: 12px;
        }
        .search-clear {
            font-size: 12px;
            color: var(--muted);
            cursor: pointer;
            float: right;
        }
        .search-clear:hover {
            color: var(--danger);
        }
        .header-actions { display: flex; justify-content: flex-end; gap: 4px; font-size: 20px; }
        .icon-link {
            position: relative;
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--ink);
        }
        .icon-link:hover {
            background: rgba(0,0,0,0.05);
        }
        .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            min-width: 18px;
            height: 18px;
            display: grid;
            place-items: center;
            padding: 0 5px;
            border-radius: 999px;
            background: var(--danger);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
        }
        .action-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            z-index: 1000;
            display: none;
            overflow: hidden;
            min-width: 280px;
        }
        .action-dropdown.show {
            display: block;
        }
        .dropdown-header {
            padding: 16px;
            border-bottom: 1px solid var(--line);
            font-weight: 700;
            font-size: 15px;
        }
        .dropdown-content {
            padding: 8px;
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            color: var(--ink);
        }
        .dropdown-item:hover {
            background: #f7f7f6;
        }
        .dropdown-item-icon {
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            background: var(--soft);
            border-radius: 8px;
            font-size: 14px;
        }
        .dropdown-item-info {
            flex: 1;
        }
        .dropdown-item-title {
            display: block;
            font-weight: 500;
        }
        .dropdown-item-desc {
            display: block;
            font-size: 12px;
            color: var(--muted);
        }
        .dropdown-divider {
            height: 1px;
            background: var(--line);
            margin: 8px 0;
        }
        .dropdown-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--line);
            text-align: center;
        }
        .dropdown-footer a {
            color: var(--accent);
            font-size: 14px;
        }
        .cart-preview-item {
            display: flex;
            gap: 12px;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .cart-preview-item:hover {
            background: #f7f7f6;
        }
        .cart-preview-image {
            width: 50px;
            height: 50px;
            background: var(--soft);
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 20px;
        }
        .cart-preview-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        .cart-preview-info {
            flex: 1;
            min-width: 0;
        }
        .cart-preview-name {
            display: block;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cart-preview-price {
            display: block;
            font-size: 14px;
            color: var(--danger);
            font-weight: 700;
            margin-top: 4px;
        }
        .cart-preview-quantity {
            display: block;
            font-size: 12px;
            color: var(--muted);
        }
        .cart-preview-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-top: 1px solid var(--line);
            font-weight: 700;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 16px;
            font-weight: 700;
        }
        .content { padding: 32px; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 0 20px;
            border-radius: var(--radius);
            border: 1px solid var(--ink);
            background: var(--panel);
            color: var(--ink);
            font-weight: 700;
        }
        .btn-primary { background: var(--ink); color: #fff; }
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 34px 0 18px;
        }
        .section-title h2 { margin: 0; font-size: 24px; }
        .muted { color: var(--muted); }
        .price { font-weight: 800; }
        .price-red { color: var(--danger); }
        .old-price { color: #9a9a9a; text-decoration: line-through; margin-left: 10px; }

        .category-list { background: #fafafa; border-radius: var(--radius); padding: 12px; }
        .category-item {
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 14px;
            border-radius: 6px;
            font-weight: 600;
        }
        .category-item:hover, .category-item.active { background: var(--soft); }
        .category-name { display: flex; align-items: center; gap: 12px; }
        .tiny-icon {
            width: 22px;
            height: 22px;
            display: grid;
            place-items: center;
            color: var(--ink);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 24px;
        }
        .product-card { min-width: 0; }
        .product-image {
            aspect-ratio: 1.08 / 1;
            border-radius: var(--radius);
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 42%, rgba(255,255,255,0.8), rgba(255,255,255,0) 32%),
                linear-gradient(135deg, #eee8df, #f8f6f2);
            display: grid;
            place-items: center;
        }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-fallback {
            width: 62%;
            aspect-ratio: 1;
            border-radius: 50%;
            background: linear-gradient(145deg, #ded6ca, #ffffff);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.06), 0 18px 36px rgba(0,0,0,0.06);
        }
        .product-name {
            margin: 12px 0 8px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .product-meta { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 14px; }
        .stars { color: #ff8a1f; letter-spacing: 1px; }
        .amount-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
        .round-add {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: var(--panel);
            font-size: 20px;
        }
        .crumb { display: flex; gap: 10px; align-items: center; color: var(--muted); margin-bottom: 24px; }
        .filters { display: grid; gap: 16px; margin-bottom: 32px; }
        .filter-row { display: flex; align-items: center; flex-wrap: wrap; gap: 14px; }
        .filter-row strong { min-width: 70px; }
        .pill {
            padding: 9px 20px;
            border-radius: 20px;
            background: #f5f4f2;
            font-weight: 600;
            border: 0;
        }
        .pill.active { background: var(--ink); color: #fff; }
        .empty-note { padding: 24px; border-radius: var(--radius); background: #fafafa; color: var(--muted); }

        @media (max-width: 1100px) {
            .page-shell { width: min(100vw - 24px, 900px); margin: 16px auto; }
            .site-header { grid-template-columns: 1fr auto; padding: 18px; }
            .nav-links { grid-column: 1 / -1; gap: 18px; overflow-x: auto; }
            .search-box { grid-column: 1 / -1; width: 100%; }
            .content { padding: 20px; }
            .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <a class="brand" href="{% url 'shop:home' %}">ShopLite</a>
            <nav class="nav-links" aria-label="主导航">
                <a class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'shop:home' %}">首页</a>
                <a class="{% if request.resolver_match.url_name == 'category' %}active{% endif %}" href="{% url 'shop:category' %}">分类</a>
                <a class="{% if request.resolver_match.url_name == 'new_products' %}active{% endif %}" href="{% url 'shop:new_products' %}">新品</a>
                <a class="{% if request.resolver_match.url_name == 'hot_products' %}active{% endif %}" href="{% url 'shop:hot_products' %}">热门</a>
                <a class="{% if request.resolver_match.url_name == 'brand_page' %}active{% endif %}" href="{% url 'shop:brand_page' %}">品牌</a>
            </nav>
            <form class="search-box" action="{% url 'shop:category' %}" method="get" id="searchForm">
                <span aria-hidden="true">Q</span>
                <input name="q" type="search" value="{{ keyword|default:'' }}" placeholder="搜索商品、品牌..." id="searchInput">
                <button class="search-btn" type="submit">搜索</button>
                <div class="search-dropdown" id="searchDropdown">
                    <div class="search-group">
                        <div class="search-group-title">热门搜索</div>
                        <div class="search-tags">
                            <span class="search-tag" onclick="fillSearch('手机')">手机</span>
                            <span class="search-tag" onclick="fillSearch('电脑')">电脑</span>
                            <span class="search-tag" onclick="fillSearch('耳机')">耳机</span>
                            <span class="search-tag" onclick="fillSearch('衣服')">衣服</span>
                            <span class="search-tag" onclick="fillSearch('化妆品')">化妆品</span>
                            <span class="search-tag" onclick="fillSearch('家居')">家居</span>
                        </div>
                    </div>
                    <div class="search-group">
                        <div class="search-group-title">搜索历史</div>
                        <div class="search-history" id="searchHistory">
                        </div>
                    </div>
                </div>
            </form>
            <div class="header-actions">
                <a class="icon-link" href="{% url 'shop:profile' %}" aria-label="个人中心">
                    <div class="user-avatar">U</div>
                </a>
                
                <div class="icon-link" id="notifyAction" onclick="toggleDropdown('notifyDropdown')">
                    <span>N</span>
                    <span class="badge">3</span>
                    <div class="action-dropdown" id="notifyDropdown">
                        <div class="dropdown-header">消息通知</div>
                        <div class="dropdown-content">
                            <a href="{% url 'shop:notifications' %}" class="dropdown-item">
                                <span class="dropdown-item-icon">O</span>
                                <span class="dropdown-item-info">
                                    <span class="dropdown-item-title">订单已发货</span>
                                    <span class="dropdown-item-desc">您的订单已发出，预计3天送达</span>
                                </span>
                            </a>
                            <a href="{% url 'shop:notifications' %}" class="dropdown-item">
                                <span class="dropdown-item-icon">P</span>
                                <span class="dropdown-item-info">
                                    <span class="dropdown-item-title">商品降价提醒</span>
                                    <span class="dropdown-item-desc">您关注的商品降价了</span>
                                </span>
                            </a>
                            <a href="{% url 'shop:notifications' %}" class="dropdown-item">
                                <span class="dropdown-item-icon">C</span>
                                <span class="dropdown-item-info">
                                    <span class="dropdown-item-title">优惠券到账</span>
                                    <span class="dropdown-item-desc">新用户专属优惠券已发放</span>
                                </span>
                            </a>
                        </div>
                        <div class="dropdown-footer">
                            <a href="{% url 'shop:notifications' %}">查看全部消息</a>
                        </div>
                    </div>
                </div>
                
                <a class="icon-link" href="{% url 'shop:cart' %}" aria-label="购物车">
                    <span>C</span>
                    {% if cart_count %}<span class="badge">{{ cart_count }}</span>{% endif %}
                </a>
            </div>
        </header>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchDropdown = document.getElementById('searchDropdown');
        const searchForm = document.getElementById('searchForm');
        const searchHistory = document.getElementById('searchHistory');

        function showDropdown() {
            searchDropdown.classList.add('show');
            loadHistory();
        }

        function hideDropdown() {
            searchDropdown.classList.remove('show');
        }

        function loadHistory() {
            const history = localStorage.getItem('searchHistory');
            if (history) {
                const items = JSON.parse(history);
                if (items.length > 0) {
                    searchHistory.innerHTML = items.map(item => 
                        `<div class="search-history-item" onclick="fillSearch('${item}')">
                            <span>Q</span>
                            <span>${item}</span>
                        </div>`
                    ).join('');
                } else {
                    searchHistory.innerHTML = '<div style="color: var(--muted); font-size: 13px; padding: 8px 12px;">暂无搜索记录</div>';
                }
            } else {
                searchHistory.innerHTML = '<div style="color: var(--muted); font-size: 13px; padding: 8px 12px;">暂无搜索记录</div>';
            }
        }

        function fillSearch(keyword) {
            searchInput.value = keyword;
            saveHistory(keyword);
            searchForm.submit();
        }

        function saveHistory(keyword) {
            if (!keyword) return;
            let history = localStorage.getItem('searchHistory');
            history = history ? JSON.parse(history) : [];
            history = history.filter(item => item !== keyword);
            history.unshift(keyword);
            if (history.length > 10) history = history.slice(0, 10);
            localStorage.setItem('searchHistory', JSON.stringify(history));
        }

        searchInput.addEventListener('focus', showDropdown);
        searchInput.addEventListener('click', showDropdown);

        document.addEventListener('click', function(e) {
            if (!searchForm.contains(e.target)) {
                hideDropdown();
            }
        });

        searchForm.addEventListener('submit', function(e) {
            const keyword = searchInput.value.trim();
            if (keyword) {
                saveHistory(keyword);
            }
        });

        function toggleDropdown(dropdownId) {
            const dropdown = document.getElementById(dropdownId);
            const allDropdowns = document.querySelectorAll('.action-dropdown');
            
            allDropdowns.forEach(d => {
                if (d.id !== dropdownId) {
                    d.classList.remove('show');
                }
            });
            
            dropdown.classList.toggle('show');
        }

        document.addEventListener('click', function(e) {
            const headerActions = document.querySelector('.header-actions');
            if (!headerActions.contains(e.target)) {
                document.querySelectorAll('.action-dropdown').forEach(d => d.classList.remove('show'));
            }
        });
    </script>
</body>
</html>
