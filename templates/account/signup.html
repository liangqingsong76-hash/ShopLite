<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ShopLite 注册</title>
    <style>
        *{
            box-sizing:border-box;
        }
        body{
            margin:0;
            height:100vh;
            background:#fafafa;
            font-family:"Microsoft YaHei";
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .container{
            width:1300px;
            height:850px;
            background:white;
            border-radius:25px;
            display:flex;
            overflow:hidden;
            box-shadow:0 10px 40px rgba(0,0,0,.08);
        }
        /* 左侧 */
        .left{
            width:50%;
            background:url("/static/images/login-bg.jpg") center/cover;
            padding:120px 80px;
        }
        .logo{
            font-size:34px;
            font-weight:bold;
        }
        .left h1{
            margin-top:150px;
            font-size:42px;
        }
        .left p{
            font-size:22px;
            color:#555;
        }
        /* 右侧 */
        .right{
            width:50%;
            padding:70px 90px;
        }
        .top{
            text-align:right;
            color:#777;
        }
        .top a{
            color:#b9854a;
            text-decoration:none;
        }
        h2{
            margin-top:100px;
            font-size:36px;
        }
        .desc{
            color:#888;
        }
        .input{
            width:100%;
            height:65px;
            margin-top:25px;
            border:1px solid #ddd;
            border-radius:12px;
            padding:0 25px;
            font-size:18px;
        }
        .btn{
            width:100%;
            height:65px;
            margin-top:35px;
            background:#222;
            color:white;
            border:none;
            border-radius:12px;
            font-size:22px;
        }
        .bottom{
            margin-top:40px;
            text-align:center;
            color:#777;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="logo">ShopLite</div>
            <h1>发现品质生活</h1>
            <p>精选好物，简约 · 实用 · 高颜值</p>
        </div>
        <div class="right">
            <div class="top">已有账号？<a href="{% url 'account_login' %}">立即登录</a></div>
            <h2>创建账号</h2>
            <p class="desc">注册ShopLite，开启品质购物体验</p>
            <form method="post" action="{% url 'account_signup' %}">
                {% csrf_token %}
                {% if form.errors %}
                    <div style="color:red;">{{ form.errors }}</div>
                {% endif %}
                <input class="input" type="text" name="username" placeholder="用户名" required>
                <input class="input" type="password" name="password1" placeholder="设置密码" required>
                <input class="input" type="password" name="password2" placeholder="确认密码" required>
                <button class="btn" type="submit">注册</button>
            </form>
            <div class="bottom">注册即表示同意 ShopLite《用户协议》和《隐私政策》</div>
        </div>
    </div>
</body>
</html>
