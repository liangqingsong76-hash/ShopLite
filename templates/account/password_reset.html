<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>找回密码 - ShopLite</title><style>{% include "account/auth_base.css" %}</style></head>
<body><header class="auth-topbar"><a class="auth-brand" href="{% url 'shop:home' %}"><span class="brand-mark">S</span><span>ShopLite</span></a><nav class="auth-links"><a href="{% url 'account_login' %}">返回登录</a><a href="{% url 'shop:help' %}">帮助中心</a></nav></header>
<main class="auth-page"><section class="auth-shell"><div class="auth-showcase"><div class="showcase-kicker">账户安全</div><div class="showcase-copy"><h1>通过已绑定手机找回账号</h1><p>验证码只在 5 分钟内有效，连续输错 5 次后会自动失效。重置成功后请使用新密码登录。</p></div><div class="deal-board"><div class="deal-card"><strong>5 min</strong><span>验证码有效期</span></div><div class="deal-card"><strong>60 s</strong><span>发送间隔</span></div><div class="deal-card"><strong>加密</strong><span>验证码摘要存储</span></div><div class="deal-card"><strong>安全</strong><span>密码强度校验</span></div></div></div>
<div class="auth-panel"><div class="panel-switch">记起密码？ <a href="{% url 'account_login' %}">返回登录</a></div><div class="auth-form"><h2>重置密码</h2><p class="subtitle">请输入注册时绑定的手机号</p><div id="resetMessage" class="form-error" style="display:none"></div><form id="resetForm">{% csrf_token %}<div class="field"><label class="field-label">手机号</label><div class="input-wrap"><span class="input-icon">☎</span><input id="resetPhone" type="tel" inputmode="numeric" autocomplete="tel" placeholder="请输入 11 位手机号" required></div></div><div class="field"><label class="field-label">短信验证码</label><div class="verify-row"><div class="input-wrap"><span class="input-icon">#</span><input id="resetCode" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="6 位验证码" required></div><button id="sendResetCode" class="verify-btn" type="button">获取验证码</button></div></div><div class="field"><label class="field-label">新密码</label><div class="input-wrap"><span class="input-icon">🔒</span><input id="resetPassword" type="password" autocomplete="new-password" minlength="8" placeholder="至少 8 位，避免常见密码" required></div></div><div class="field"><label class="field-label">确认新密码</label><div class="input-wrap"><span class="input-icon">🔒</span><input id="resetPassword2" type="password" autocomplete="new-password" required></div></div><button class="primary-submit" type="submit">重置密码</button></form></div></div></section></main>
<script>(function(){const form=document.getElementById('resetForm'),phone=document.getElementById('resetPhone'),code=document.getElementById('resetCode'),password=document.getElementById('resetPassword'),password2=document.getElementById('resetPassword2'),send=document.getElementById('sendResetCode'),message=document.getElementById('resetMessage'),csrf=document.querySelector('[name=csrfmiddlewaretoken]').value;function show(text,ok){message.textContent=text;message.style.display=text?'':'none';message.style.color=ok?'#18794e':''}async function post(url,data){const response=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':csrf},body:JSON.stringify(data)});const result=await response.json();if(!response.ok)throw new Error(result.error||'请求失败');return result}send.addEventListener('click',async()=>{show('');try{await post('/api/auth/phone/code/',{phone:phone.value,purpose:'reset'});let n=60;send.disabled=true;send.textContent=n+'秒';const timer=setInterval(()=>{n--;send.textContent=n+'秒';if(n<=0){clearInterval(timer);send.disabled=false;send.textContent='获取验证码'}},1000);show('验证码已发送；本地开发请查看服务控制台。',true)}catch(e){show(e.message)}});form.addEventListener('submit',async(e)=>{e.preventDefault();show('');if(password.value!==password2.value){show('两次输入的密码不一致');return}try{const result=await post('/api/auth/phone/password-reset/',{phone:phone.value,code:code.value,password:password.value,password_confirm:password2.value});show('密码已重置，正在返回登录页…',true);setTimeout(()=>location.href=result.redirect_url,800)}catch(err){show(err.message)}})})();</script></body></html>
