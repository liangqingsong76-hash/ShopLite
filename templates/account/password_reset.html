<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ShopLite 找回密码</title>
    <style>
        *{box-sizing:border-box;}
        body{
            height:100vh;
            margin:0;
            background:#fafafa;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family: "Microsoft YaHei";
        }
        .container{
            width:1300px;
            height:850px;
            background:white;
            border-radius:25px;
            overflow:hidden;
            display:flex;
            box-shadow:0 10px 40px rgba(0,0,0,.08);
        }
        .left{
            width:50%;
            background:url("/static/images/login-bg.jpg") center/cover;
            padding:120px 80px;
        }
        .logo{
            font-size:34px;
            font-weight:bold;
        }
        .left h1{
            margin-top:150px;
            font-size:42px;
        }
        .left p{
            font-size:22px;
            color:#555;
        }
        .right{
            width:50%;
            padding:70px 90px;
        }
        .top{
            text-align:right;
            color:#777;
        }
        .top a{
            color:#b9854a;
            text-decoration:none;
        }
        h2{
            margin-top:150px;
            font-size:36px;
        }
        .desc{
            color:#888;
        }
        .input{
            width:100%;
            height:65px;
            margin-top:30px;
            border:1px solid #ddd;
            border-radius:12px;
            padding:0 25px;
            font-size:18px;
        }
        .code{
            display:flex;
            gap:15px;
        }
        .code input{
            flex:1;
        }
        .code button{
            width:130px;
            border:none;
            background:#eee;
            border-radius:12px;
        }
        .btn{
            margin-top:35px;
            width:100%;
            height:65px;
            background:#222;
            color:white;
            border:none;
            border-radius:12px;
            font-size:22px;
        }
        .back{
            margin-top:35px;
            text-align:center;
        }
        .back a{
            color:#b9854a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="logo">ShopLite</div>
            <h1>发现品质生活</h1>
            <p>精选好物，简约 · 实用 · 高颜值</p>
        </div>
        <div class="right">
            <div class="top">记起密码？
                <a href="{% url 'account_login' %}">返回登录</a>
            </div>
            <h2>找回密码</h2>
            <p class="desc">输入账号信息，我们将帮助你重置密码</p>
            <form>
                <input class="input" placeholder="手机号 / 邮箱">
                <div class="code">
                    <input class="input" placeholder="验证码">
                    <button>获取验证码</button>
                </div>
                <input class="input" type="password" placeholder="新密码">
                <input class="input" type="password" placeholder="确认新密码">
                <button class="btn">重置密码</button>
            </form>
            <div class="back">返回
                <a href="/login/">登录</a>
            </div>
        </div>
    </div>
</body>
</html>
