<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopLite - 登录</title>
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== 全局重置 & 基础样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f5f7;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        /* ===== 主卡片容器 ===== */
        .card {
            display: flex;
            width: 1100px;
            max-width: 100%;
            min-height: 620px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* ===== 左栏（视觉区） ===== */
        .card-left {
            flex: 1;
            background-color: #f6f1eb;
            padding: 36px 40px 28px 40px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Logo */
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
        }

        /* 文案区域 */
        .hero-text {
            margin-bottom: 20px;
        }
        .hero-text h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }
        .hero-text p {
            margin-top: 8px;
            font-size: 16px;
            color: #6b6b6b;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* 图片 */
        .hero-image-wrapper {
            flex: 1;
            min-height: 220px;
            margin: 6px 0 18px 0;
            border-radius: 12px;
            overflow: hidden;
            background-color: #e8dfd5;
        }
        .hero-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 底部三个特性 */
        .features {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: auto;
            padding-top: 6px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #3a3a3a;
            font-weight: 500;
        }
        .feature-item i {
            font-size: 20px;
            color: #4a4a4a;
            width: 24px;
            text-align: center;
        }
        .feature-item .feat-text {
            display: flex;
            flex-direction: column;
            line-height: 1.3;
        }
        .feature-item .feat-text span:first-child {
            font-weight: 600;
            font-size: 13px;
        }
        .feature-item .feat-text span:last-child {
            font-weight: 400;
            font-size: 11px;
            color: #8a8a8a;
        }

        /* ===== 右栏（登录区） ===== */
        .card-right {
            flex: 1;
            background: #ffffff;
            padding: 36px 48px 32px 48px;
            display: flex;
            flex-direction: column;
        }

        /* 顶部注册引导 */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-size: 14px;
            color: #7a7a7a;
            margin-bottom: 28px;
        }
        .top-bar a {
            color: #c49a7a;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }
        .top-bar a:hover {
            color: #a67c5a;
        }
        .top-bar span {
            margin-right: 4px;
        }

        /* 欢迎标题 */
        .welcome {
            margin-bottom: 28px;
        }
        .welcome h2 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.2px;
        }
        .welcome p {
            margin-top: 6px;
            font-size: 14px;
            color: #8a8a8a;
            font-weight: 400;
        }

        /* 表单 */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            border: 1px solid #e4e4e4;
            border-radius: 10px;
            background: #fafafa;
            transition: border-color 0.25s, box-shadow 0.25s;
            height: 50px;
        }
        .input-group:focus-within {
            border-color: #c49a7a;
            box-shadow: 0 0 0 3px rgba(196, 154, 122, 0.12);
            background: #ffffff;
        }
        .input-group .prefix-icon {
            padding-left: 16px;
            color: #b0b0b0;
            font-size: 16px;
            transition: color 0.2s;
            min-width: 40px;
        }
        .input-group:focus-within .prefix-icon {
            color: #c49a7a;
        }
        .input-group input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            padding: 0 14px 0 6px;
            font-size: 15px;
            font-weight: 400;
            color: #1a1a1a;
            height: 100%;
            font-family: inherit;
        }
        .input-group input::placeholder {
            color: #b8b8b8;
            font-weight: 400;
        }
        .input-group .suffix-icon {
            padding-right: 16px;
            color: #b0b0b0;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s;
            background: transparent;
            border: none;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .input-group .suffix-icon:hover {
            color: #7a7a7a;
        }

        /* 选项行（记住我 + 忘记密码） */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2px 0 6px 0;
        }
        .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #4a4a4a;
            cursor: pointer;
            user-select: none;
        }
        .checkbox-wrap input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 1.5px solid #d0d0d0;
            border-radius: 5px;
            background: #ffffff;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .checkbox-wrap input[type="checkbox"]:checked {
            background-color: #1a1a1a;
            border-color: #1a1a1a;
        }
        .checkbox-wrap input[type="checkbox"]:checked::after {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 11px;
            color: #ffffff;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .checkbox-wrap input[type="checkbox"]:focus-visible {
            outline: 2px solid #c49a7a;
            outline-offset: 1px;
        }

        .forgot-link {
            font-size: 14px;
            color: #c49a7a;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .forgot-link:hover {
            color: #a67c5a;
        }

        /* 登录按钮 */
        .btn-submit {
            background: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            height: 50px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.25s, transform 0.15s;
            letter-spacing: 0.5px;
            font-family: inherit;
            margin-top: 4px;
        }
        .btn-submit:hover {
            background: #2a2a2a;
            transform: translateY(-1px);
        }
        .btn-submit:active {
            transform: scale(0.98);
        }

        /* 社交登录 */
        .social-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 22px 0 16px 0;
            color: #b0b0b0;
            font-size: 13px;
            font-weight: 400;
        }
        .social-divider::before,
        .social-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 24px;
        }
        .social-icons .icon-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid #e8e8e8;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #4a4a4a;
            cursor: pointer;
            transition: all 0.25s;
            text-decoration: none;
        }
        .social-icons .icon-btn:hover {
            border-color: #c49a7a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
        }
        .social-icons .icon-btn.wechat {
            color: #07c160;
        }
        .social-icons .icon-btn.wechat:hover {
            background: #f0fcf5;
        }
        .social-icons .icon-btn.alipay {
            color: #1677ff;
        }
        .social-icons .icon-btn.alipay:hover {
            background: #f0f5ff;
        }
        .social-icons .icon-btn.apple {
            color: #1a1a1a;
        }
        .social-icons .icon-btn.apple:hover {
            background: #f5f5f5;
        }

        /* 底部协议 */
        .agreement {
            margin-top: auto;
            text-align: center;
            font-size: 12px;
            color: #b0b0b0;
            padding-top: 20px;
            letter-spacing: 0.2px;
        }
        .agreement a {
            color: #c49a7a;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .agreement a:hover {
            color: #a67c5a;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 900px) {
            .card {
                flex-direction: column;
                max-width: 500px;
                min-height: auto;
                border-radius: 20px;
            }
            .card-left {
                padding: 28px 28px 20px 28px;
                min-height: 320px;
            }
            .card-right {
                padding: 28px 28px 24px 28px;
            }
            .hero-text h1 {
                font-size: 26px;
            }
            .hero-image-wrapper {
                min-height: 140px;
            }
            .features {
                gap: 4px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .feature-item {
                font-size: 12px;
            }
            .welcome h2 {
                font-size: 24px;
            }
            .top-bar {
                margin-bottom: 18px;
            }
        }

        @media (max-width: 480px) {
            .card-left {
                padding: 20px 18px 16px 18px;
                min-height: 240px;
            }
            .card-right {
                padding: 20px 18px 20px 18px;
            }
            .hero-text h1 {
                font-size: 22px;
            }
            .hero-text p {
                font-size: 14px;
            }
            .hero-image-wrapper {
                min-height: 100px;
            }
            .feature-item .feat-text span:first-child {
                font-size: 11px;
            }
            .feature-item .feat-text span:last-child {
                font-size: 10px;
            }
            .logo {
                font-size: 18px;
            }
            .welcome h2 {
                font-size: 20px;
            }
            .input-group {
                height: 44px;
            }
            .btn-submit {
                height: 44px;
                font-size: 15px;
            }
            .social-icons .icon-btn {
                width: 40px;
                height: 40px;
                font-size: 17px;
            }
            .social-icons {
                gap: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- ====== 左栏 ====== -->
        <div class="card-left">
            <div class="logo">ShopLite</div>

            <div class="hero-text">
                <h1>发现品质生活</h1>
                <p>精选好物，简约 · 实用 · 高颜值</p>
            </div>

            <div class="hero-image-wrapper">
                <!--
                  使用 Unsplash 的静物家居图片，风格与原设计接近。
                  如果图片加载失败，会显示背景颜色占位。
                -->
                <img
                src="https://images.unsplash.com/photo-1513519245088-0e12902e5a38?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                alt="品质家居场景"
                loading="lazy"
                />
            </div>

            <div class="features">
                <div class="feature-item">
                    <i class="fa-regular fa-circle-check"></i>
                    <div class="feat-text">
                        <span>正品保障</span>
                        <span>官方正品</span>
                    </div>
                </div>
                <div class="feature-item">
                    <i class="fa-regular fa-rotate-left"></i>
                    <div class="feat-text">
                        <span>7天无理由退换</span>
                        <span>购物无忧</span>
                    </div>
                </div>
                <div class="feature-item">
                    <i class="fa-regular fa-truck"></i>
                    <div class="feat-text">
                        <span>极速配送</span>
                        <span>快速送达</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ====== 右栏 ====== -->
        <div class="card-right">
            <div class="top-bar">
                <span>还没有账号？</span>
                <a href="#">立即注册</a>
            </div>

            <div class="welcome">
                <h2>欢迎回来</h2>
                <p>登录您的账号，发现更多精彩</p>
            </div>

            <form class="login-form">
                <!-- 手机号 / 邮箱 -->
                <div class="input-group">
                    <span class="prefix-icon"><i class="fa-regular fa-user"></i></span>
                    <input type="text" placeholder="手机号 / 邮箱" />
                </div>

                <!-- 密码 -->
                <div class="input-group">
                    <span class="prefix-icon"><i class="fa-regular fa-lock"></i></span>
                    <input type="password" id="passwordInput" placeholder="密码" />
                    <button type="button" class="suffix-icon" id="togglePassword" aria-label="切换密码可见性">
                        <i class="fa-regular fa-eye" id="eyeIcon"></i>
                    </button>
                </div>

                <!-- 选项 -->
                <div class="options-row">
                    <label class="checkbox-wrap">
                        <input type="checkbox" checked />
                        记住我
                    </label>
                    <a href="#" class="forgot-link">忘记密码？</a>
                </div>

                <!-- 登录按钮 -->
                <button type="submit" class="btn-submit">登录</button>
            </form>

            <!-- 社交登录 -->
            <div class="social-divider">或使用以下方式登录</div>
            <div class="social-icons">
                <a href="#" class="icon-btn wechat" aria-label="微信登录">
                    <i class="fa-brands fa-weixin"></i>
                </a>
                <a href="#" class="icon-btn alipay" aria-label="支付宝登录">
                    <i class="fa-brands fa-alipay"></i>
                </a>
                <a href="#" class="icon-btn apple" aria-label="Apple 登录">
                    <i class="fa-brands fa-apple"></i>
                </a>
            </div>

            <!-- 协议 -->
            <div class="agreement">
                登录即表示您同意 ShopLite 的
                <a href="#">《用户协议》</a>
                和
                <a href="#">《隐私政策》</a>
            </div>
        </div>
    </div>

    <!-- ====== JavaScript ====== -->
    <script>
        (function() {
            // 密码可见切换
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');

            if (toggleBtn && passwordInput && eyeIcon) {
                toggleBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const isPassword = passwordInput.getAttribute('type') === 'password';
                    // 切换类型
                    passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                    // 切换图标
                    eyeIcon.className = isPassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
                });
            }

            // 表单提交拦截（仅演示）
            const form = document.querySelector('.login-form');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    // 这里可以添加实际的登录请求逻辑
                    alert('演示模式：登录请求已拦截。');
                });
            }
        })();
    </script>

</body>
</html>
