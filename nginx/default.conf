upstream shoplite_web {
    server web:8000;
}

# 保留外层负载均衡传入的 HTTPS 协议；直接访问 Nginx 时回退到当前协议。
map $http_x_forwarded_proto $shoplite_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    location /static/ {
        alias /app/static/;
        expires 7d;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://shoplite_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $shoplite_forwarded_proto;
        proxy_connect_timeout 10s;
        proxy_read_timeout 65s;
    }

    location = /health/ {
        proxy_pass http://shoplite_web;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $shoplite_forwarded_proto;
        access_log off;
    }
}
